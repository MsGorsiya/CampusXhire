<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Xhire | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(rgba(2, 6, 23, 0.78), rgba(2, 6, 23, 0.78)),
                url("{{ url_for('static', filename='bg1.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e5e7eb;
            overflow: hidden;
        }

        /* Floating gradient blobs */
        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(56,189,248,0.18), transparent 70%);
            filter: blur(60px);
            animation: float 14s ease-in-out infinite;
        }

        body::after {
            background: radial-gradient(circle, rgba(34,197,94,0.18), transparent 70%);
            animation-delay: 6s;
            bottom: -120px;
            right: -120px;
        }

        body::before {
            top: -120px;
            left: -120px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        /* Login card */
        .login-box {
            position: relative;
            z-index: 2;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(18px);
            border-radius: 22px;
            padding: 45px 38px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            animation: cardEnter 0.7s ease;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo {
            width: 90px;
            margin: 0 auto 18px;
            display: block;
            filter: drop-shadow(0 6px 15px rgba(0,0,0,0.5));
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #f8fafc;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .role-btn {
            width: 100%;
            border-radius: 14px;
            padding: 15px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #f8fafc;
            transition: all 0.25s ease;
        }

        .role-btn.company {
            background: linear-gradient(135deg, #047857, #065f46);
        }

        .role-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.45);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>

<body>
{% include 'partials/nav_buttons.html' %}

    <div class="login-box">
        <img src="{{ url_for('static', filename='main.jpeg') }}" alt="CampusXhire Logo" class="logo">

        <div class="title">Campus Xhire</div>
        <div class="subtitle">Choose your role to continue</div>

        <a href="{{ url_for('student.student_register') }}" class="btn role-btn">
             Login as Student
        </a>

        <a href="{{ url_for('company.company_register') }}" class="btn role-btn company">
         Login as Company
        </a>

        <div class="footer">
             2026 Campus Xhire. All rights reserved.
        </div>
    </div>

</body>
</html>
