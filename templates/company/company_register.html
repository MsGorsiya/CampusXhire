<!DOCTYPE html>
<html lang="en">
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Company Registration | CampusXHire</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(rgba(5, 11, 38, 0.78), rgba(5, 11, 38, 0.78)),
                url("{{ url_for('static', filename='bg1.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e5f7ef;
        }

        .card {
             background: rgba(39, 33, 70, 0.92);
             backdrop-filter: blur(14px);
             border-radius: 15px;
             border: 1px solid rgba(100, 185, 209, 0.18);
             width: 100%;
             min-width: 400px;
             max-width: 700px;
             text-align: center;
        }

        h3 { color: #d6ffe8; }

        label {
            color: #47b1b8;
            display: block;
            text-align: left;
            margin-bottom: 5px;
            padding-left: 2.5px;
            font-size: 18px;
        }

        .form-control, select {
            background: rgba(255,255,255,0.12);
            border: none;
            color: #fff;
            border-radius: 10px;
            padding: 11px;
            transition: all 0.3s ease;
        }
        select option { color: #0f172a; background: #ffffff; }

        .form-control::placeholder { color: rgba(255,255,255,0.7); }

        .form-control:focus, select:focus {
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 0 2px rgba(171,234,173,0.35);
            color: #fff;
        }

        .btn { border-radius: 12px; padding: 11px; font-weight: 500; }

        .btn-primary { background: linear-gradient(135deg, #3da2dc, #335bdf); border: none; }
        .btn-success { background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.35); }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"> </head>

<body class="d-flex align-items-center justify-content-center">
{% include 'partials/nav_buttons.html' %}

<form method="POST" id="companyForm" novalidate>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card p-4 shadow-lg">
                <h3 class="text-center fw-bold mb-4" style="font-size:30px;">Company Registration</h3>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <!-- ================= STEP 1 : EMAIL ================= -->
                {% if step == "email" %}
                    <div class="mb-3 text-start">
                        <label>Official Company Email</label>
                        <input type="email" name="email" class="form-control" required placeholder="hr@company.com">
                    </div>

                    <button type="submit" name="send_otp" class="btn btn-primary w-100">Send OTP</button>
                {% endif %}

                <!-- ================= STEP 2 : OTP ================= -->
                {% if step == "otp" %}
                    <div class="mb-3 text-start">
                        <label>Enter OTP</label>
                        <input type="text" name="otp" class="form-control" required placeholder="6-digit OTP">
                    </div>

                    <button type="submit" name="verify_otp" class="btn btn-success w-100">Verify OTP</button>
                {% endif %}

                <!-- ================= STEP 3 : COMPANY DETAILS ================= -->
                {% if step == "details" %}
                <div class="row">

                    <div class="col-md-6 mb-3 text-start">
                        <label>Company Name</label>
                        <input type="text" name="company_name" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3 text-start">
                        <label>HR / Recruiter Name</label>
                        <input type="text" name="hr_name" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3 text-start">
                        <label>Mobile Number</label>
                        <input type="text" name="mobile_no" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3 text-start">
                        <label>Industry Type</label>
                        <select name="industry_type" class="form-control" required>
                            <option value="">Select Industry</option>
                            <option>Information Technology</option>
                            <option>Finance</option>
                            <option>Healthcare</option>
                            <option>Education</option>
                            <option>Manufacturing</option>
                            <option>Marketing</option>
                            <option>Consulting</option>
                            <option>E-Commerce</option>
                            <option>Startup</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3 text-start">
                        <label>Company Website</label>
                        <input type="url" name="website" class="form-control" placeholder="https://company.com">
                    </div>

                    <div class="col-md-6 mb-3 text-start">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                </div>

                <button type="submit" name="register_company" class="btn btn-primary w-100">Register Company</button>
                {% endif %}

                <!-- ================= LOGIN LINK ================= -->
                 <div class="text-center mt-3">
                    <small style="color: white;">
                        Already registered?
                        <a href="{{ url_for('company.company_login') }}" class="text-decoration-none">Login</a>
                    </small>
                </div>

            </div>

        </div>
    </div>
</div>

</form>


</html>
