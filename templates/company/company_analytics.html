<!DOCTYPE html>
<html>
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>
<body>

<h1 style="text-align:center;">ðŸ“Š Company Analytics</h1>

<div style="text-align:center;">
    <p><strong>Total Jobs:</strong> {{ total_jobs }}</p>
    <p><strong>Active Jobs:</strong> {{ active_jobs }}</p>
    <p><strong>Total Applications:</strong> {{ total_applications }}</p>
</div>

<div style="width:400px; margin:auto;">
    <canvas id="applicationChart"></canvas>
</div>

<script>
    const ctx = document.getElementById('applicationChart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Approved', 'Rejected', 'Pending'],
            datasets: [{
                data: [
                    {{ approved }},
                    {{ rejected }},
                    {{ pending }}
                ],
                backgroundColor: [
                    '#28a745',
                    '#dc3545',
                    '#ffc107'
                ]
            }]
        }
    });
</script>

</body>
</html>
