<!DOCTYPE html>
<html>
<head>
    <title>Company Login | CampusXHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --dark-bg: #0f172a;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background:
                linear-gradient(rgba(5, 11, 38, 0.78), rgba(5, 11, 38, 0.78)),
                url("{{ url_for('static', filename='bg1.jpg') }}");;
              
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
        }

        body::before {
            background: radial-gradient(circle, rgba(37, 99, 235, 0.4), transparent 70%);
            top: -150px;
            left: -150px;
            animation: blobFloat 15s ease-in-out infinite;
        }

        body::after {
            background: radial-gradient(circle, rgba(124, 58, 237, 0.4), transparent 70%);
            bottom: -150px;
            right: -150px;
            animation: blobFloat 15s ease-in-out infinite 7s;
        }

        @keyframes blobFloat {
            0%, 100% { 
                transform: translate(0, 0);
                opacity: 0.3;
            }
            50% { 
                transform: translate(50px, -50px);
                opacity: 0.5;
            }
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 16px;
            color: white;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            margin: 20px;
            animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .login-card h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            animation: slideInUp 0.8s ease-out 0.2s both;
        }

        .login-subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
            animation: slideInUp 0.8s ease-out 0.3s both;
        }

        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
            animation: slideInUp 0.8s ease-out both;
        }

        .input-group:nth-child(n+2) {
            animation-delay: 0.4s;
        }

        .input-group:nth-child(3) {
            animation-delay: 0.5s;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #cbd5e1;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid rgba(37, 99, 235, 0.2);
            background: rgba(148, 163, 184, 0.1);
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(37, 99, 235, 0.1);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
            animation: slideInUp 0.8s ease-out 0.6s both;
            margin-top: 10px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, var(--primary-color) 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.5);
        }

        .error-box {
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 20px;
            padding: 12px 15px;
            background: rgba(220, 38, 38, 0.2);
            border-left: 3px solid #dc2626;
            border-radius: 6px;
            animation: slideInUp 0.6s ease-out;
        }

        p {
            text-align: center;
            margin-top: 25px;
            color: #cbd5e1;
            font-size: 14px;
            animation: slideInUp 0.8s ease-out 0.7s both;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 40px 25px;
                margin: 20px;
            }

            .login-card h2 {
                font-size: 24px;
            }

            button {
                padding: 11px;
                font-size: 14px;
            }

            input {
                padding: 11px 12px;
            }
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>

<body>
{% include 'partials/nav_buttons.html' %}

    <div class="login-card">
        <h2>🏢 Company Login</h2>
        <div class="login-subtitle">Manage your job postings</div>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <label for="email">Official Company Email</label>
                <input type="email" id="email" name="email" placeholder="hr@company.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p>
            New company? <a href="{{ url_for('company.company_register') }}">Register here</a>
        </p>
    </div>

</body>
</html>
