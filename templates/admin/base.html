<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1f4b7a;
            --secondary: #2f6ea6;
            --dark: #0f2337;
            --dark-2: #18344f;
            --surface: #f7f9fc;
            --border: #d6e0ea;
            --text: #1a2d3f;
            --muted: #5f7388;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #f7f9fc 0%, #eef3f8 100%);
            color: var(--text);
        }

        .sidebar {
            width: 250px;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: linear-gradient(135deg, var(--dark), var(--dark-2));
            padding: 20px 12px;
        }

        .brand {
            color: #fff;
            font-weight: 800;
            text-decoration: none;
            display: block;
            padding: 10px 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 12px;
        }

        .sidebar a.nav-link {
            color: #c2cfde;
            border-radius: 10px;
            margin-bottom: 6px;
            padding: 10px 12px;
        }

        .sidebar a.nav-link:hover,
        .sidebar a.nav-link.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .main {
            margin-left: 250px;
            padding: 24px;
        }

        .panel-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(15, 35, 55, 0.08);
        }

        .kpi-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            background: #fff;
            height: 100%;
        }

        .kpi-label {
            font-size: 0.82rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--muted);
        }

        .kpi-value {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--primary);
        }

        .table th {
            background: #f2f6fb;
            color: var(--text);
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>
<body>
    <aside class="sidebar">
        <a href="{{ url_for('auth.admin_dashboard') }}" class="brand">
            <i class="bi bi-shield-lock-fill"></i> CampusXHire Admin
        </a>

        <nav class="nav flex-column">
            <a class="nav-link {% if request.endpoint == 'auth.admin_dashboard' %}active{% endif %}" href="{{ url_for('auth.admin_dashboard') }}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="nav-link {% if request.endpoint == 'auth.admin_students' %}active{% endif %}" href="{{ url_for('auth.admin_students') }}">
                <i class="bi bi-mortarboard"></i> Students
            </a>
            <a class="nav-link {% if request.endpoint == 'auth.admin_companies' %}active{% endif %}" href="{{ url_for('auth.admin_companies') }}">
                <i class="bi bi-building"></i> Companies
            </a>
            <a class="nav-link {% if request.endpoint == 'auth.admin_jobs' %}active{% endif %}" href="{{ url_for('auth.admin_jobs') }}">
                <i class="bi bi-briefcase"></i> Jobs
            </a>
            <a class="nav-link {% if request.endpoint == 'auth.admin_applications' %}active{% endif %}" href="{{ url_for('auth.admin_applications') }}">
                <i class="bi bi-file-earmark-text"></i> Applications
            </a>
        </nav>

        <form class="mt-4" method="POST" action="{{ url_for('auth.admin_logout') }}">
            <button class="btn btn-outline-light w-100" type="submit">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </form>
    </aside>

    <main class="main">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'warning' if category == 'warning' else ('danger' if category == 'danger' else 'success') }} mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
