<!DOCTYPE html>
<html>
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <style>
        body { background:
                linear-gradient(rgba(5, 11, 38, 0.78), rgba(5, 11, 38, 0.78)),
                url("{{ url_for('static', filename='bg1.jpg') }}");               font-family: sans-serif;
               display: flex; 
               justify-content: center; 
               align-items: center;
               height: 100vh; 
               margin: 0; }
        .login-card {
            background:rgba(39, 33, 70, 0.92);;
            padding: 40px;
            border-radius: 15px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px; /* Fixed width to prevent text wrapping */
            text-align: center;
        }
        input { width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: none; 
            box-sizing: border-box; 
            background: rgba(255,255,255,0.12);
        
        }

        button { width: 100%; 
            padding: 10px; 
            background: linear-gradient(135deg, #3da2dc, #335bdf);
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 18px;
        }

        .error { color: #ef4444; 
            font-size: 0.9em; 
            margin-bottom: 10px; 
        }

        a { color: #60a5fa; 
            text-decoration: none; 
            font-size: 0.8em; 
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>
<body>
{% include 'partials/nav_buttons.html' %}
    <div class="login-card">
        <h2>Student Login</h2>
        
        {% if errors %}
            {% for error in errors %}
                <p class="error">{{ error }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required style="color: white;">
            <input type="password" name="password" placeholder="Enter password" required style="color: white;">
            <button type="submit">Login</button>
        </form>

        <p style="margin-top: 20px; ">
            New student? <a href="{{ url_for('student.student_register') }}" style="text-decoration: underline; font-size: 15px;">Register here</a>
        </p>
    </div>
</body>
</html>
