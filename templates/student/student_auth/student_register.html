<!DOCTYPE html>
<html lang="en">
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Student Registration | CampusXHire</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(rgba(5, 11, 38, 0.78), rgba(5, 11, 38, 0.78)),
                url("{{ url_for('static', filename='bg1.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e5f7ef;
        }

        /* Animated Card */
        .card {
             background: rgba(39, 33, 70, 0.92);
             backdrop-filter: blur(14px);
             border-radius: 15px;
             border: 1px solid rgba(100, 185, 209, 0.18);
             width: 100%;
             min-width: 400px;
             max-width: 700px; /* Fixed width to prevent text wrapping */
             text-align: center;
        }
        

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h3 {
            color: #d6ffe8;
        }

        label {
            color: #47b1b8;
            display: block;      /* Makes the label take up the full width */
            text-align: left;    /* Explicitly aligns text to the left */
            margin-bottom: 5px;  /* Adds space between label and input box */
            padding-left: 2.5px;
            font-size: 18px;
        }

        .form-control, select {
            background: rgba(255,255,255,0.12);
            border: none;
            color: #fff;
            border-radius: 10px;
            padding: 11px;
            transition: all 0.3s ease;
        }
        select option {
            color: #0f172a;
            background: #ffffff;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .form-control:focus, select:focus {
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 0 2px rgba(171,234,173,0.35);
            color: #fff;
        }

        .btn {
            border-radius: 12px;
            padding: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3da2dc, #335bdf);
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        /* Step fade animation */
        .step-animate {
            animation: stepFade 0.6s ease;
        }

        @keyframes stepFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>

<body class="d-flex align-items-center justify-content-center">
{% include 'partials/nav_buttons.html' %}

<form method="POST" enctype="multipart/form-data" id="studentForm" novalidate>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card p-4 shadow-lg">
                <h3 class="text-center fw-bold mb-4 " style="font-size:30px;">Student-Registration</h3>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <div class="step-animate">

                <!-- ================= STEP 1 : EMAIL ================= -->
                {% if step == "email" %}
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <button type="submit" name="send_otp" class="btn btn-primary w-100">
                        Send OTP
                    </button>
                {% endif %}

                <!-- ================= STEP 2 : OTP ================= -->
                {% if step == "otp" %}
                    <div class="mb-3">
                        <label>Enter OTP</label>
                        <input type="text" name="otp" class="form-control" required>
                    </div>

                    <button type="submit" name="verify_otp" class="btn btn-success w-100">
                        Verify OTP
                    </button>
                {% endif %}

                <!-- ================= STEP 3 : FULL DETAILS ================= -->
                {% if step == "details" %}
                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Full Name</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Mobile Number</label>
                        <input type="text" name="mobile_no" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Field</label>
                        <select name="field" class="form-control" id="field" required>
                            <option value="">Select Field</option>
                            <option value="Engineering">Engineering</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Specialization</label>
                        <select name="specialization" class="form-control" id="specialization" required>
                            <option value="">Select Specialization</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Engineering College</label>
                        <select name="college_id" class="form-control" required>
                            <option value="">-- Select College --</option>
                            {% for college in colleges %}
                                <option value="{{ college.id }}">
                                    {{ college.college_name }} ({{ college.city }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Starting Year</label>
                        <input type="number" name="start_year" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Ending Year</label>
                        <input type="number" name="end_year" class="form-control" required>
                    </div>

                    <div class="col-12 mb-3">
                        <label>Skills</label>
                        <input type="text" name="skills" class="form-control">
                    </div>

                </div>

                <button type="submit" name="register" class="btn btn-primary w-100">
                    Register Student
                </button>
                {% endif %}

                <!-- ================= LOGIN LINK ================= -->
                 <div class="text-center mt-3">
                    <small style="color: white;">
                        Already registered?
                        <a href="{{ url_for('student.student_login') }}" class="text-decoration-none">

                            Login 
                        </a>
                    </small>
                </div>


                </div>
            </div>

        </div>
    </div>
</div>

</form>

<!-- YOUR EXISTING JS (UNCHANGED) -->
<script>
const specializationMap = {
    "Engineering": [
        "CE (Civil Engineering)",
        "CSE (Computer Science Engineering)",
        "IT (Information Technology)",
        "ME (Mechanical Engineering)",
        "EE (Electrical Engineering)",
        "ECE (Electronics & Communication)",
        "AI & DS",
        "Cyber Security"
    ]
};

document.getElementById("field")?.addEventListener("change", function () {
    const spec = document.getElementById("specialization");
    spec.innerHTML = '<option value="">Select Specialization</option>';

    if (specializationMap[this.value]) {
        specializationMap[this.value].forEach(branch => {
            let opt = document.createElement("option");
            opt.value = branch;
            opt.textContent = branch;
            spec.appendChild(opt);
        });
    }
});
</script>

</body>
</html>
