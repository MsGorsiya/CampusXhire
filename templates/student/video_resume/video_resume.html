<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Resume - CampusXHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #05192e;
            --secondary: #0a2033;
            --accent: #112c43;
            --dark: #0f2337;
            --dark-2: #18344f;
            --light: #e7edf3;z
            --surface: #f7f9fc;
            --white: #ffffff;
            --text-dark: #1a2d3f;
            --text-muted: #5f7388;
            --border: #d6e0ea;
            --shadow-sm: 0 4px 14px rgba(15, 35, 55, 0.08);
            --shadow-md: 0 10px 24px rgba(15, 35, 55, 0.1);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #f7f9fc 0%, #eef3f8 100%);
            color: var(--text-dark);
        }

        .hero {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
            color: #fff;
            padding: 52px 20px;
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .hero h1 {
            margin-bottom: 6px;
            font-weight: 800;
        }

        .hero p {
            margin-bottom: 8px;
            opacity: 0.95;
        }

        .container-main {
            max-width: 1100px;
            margin: 26px auto 50px;
            padding: 0 16px;
        }

        section {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-sm);
        }

        h2 {
            margin-bottom: 16px;
            color: var(--primary);
            font-size: 1.35rem;
            font-weight: 700;
        }

        .back-link {
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--secondary);
        }

        .info-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 16px;
            color: var(--text-muted);
            border-left: 4px solid var(--accent);
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 10px;
            background: #000;
            border: 1px solid var(--border);
        }

        .progress-info {
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
        }

        .timer {
            min-width: 84px;
            text-align: center;
            font-weight: 700;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--primary);
            background: var(--white);
        }

        .timer.recording {
            color: var(--secondary);
            background: #edf4fb;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .btn-action {
            border: none;
            border-radius: 8px;
            padding: 11px 16px;
            font-weight: 600;
            color: #fff;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
        }

        .btn-stop {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .status-message {
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: 600;
        }

        .status-success {
            color: var(--secondary);
            background: var(--surface);
        }

        .status-error {
            color: #7a1f1f;
            background: #fff4f4;
            border-color: #efc9c9;
        }

        .upload-input {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>
<body>
    <div class="hero">
        <h1><i class="bi bi-camera-video"></i> Video Resume</h1>
        <p>Record a professional 30-second introduction</p>
        <p>
            <a class="back-link text-white" href="{{ url_for('student.student_dashboard') }}">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </p>
    </div>

    <div class="container-main">
        <section>
            <h2><i class="bi bi-film"></i> Record New Video</h2>

            <div class="info-box">
                <i class="bi bi-info-circle"></i> Speak clearly and keep it concise. Maximum recording time is 30 seconds.
            </div>

            <video id="preview" autoplay muted playsinline></video>

            <div class="progress-info">
                <span>Time Remaining</span>
                <div class="timer" id="timer">30s</div>
            </div>

            <div class="button-group">
                <button id="startBtn" class="btn-action btn-start">
                    <i class="bi bi-play-circle"></i> Start Recording
                </button>
                <button id="stopBtn" class="btn-action btn-stop" disabled>
                    <i class="bi bi-stop-circle"></i> Stop Recording
                </button>
            </div>

            <p id="status" class="status-message" style="display: none;"></p>
        </section>

        {% if student.video_resume %}
        <section>
            <h2><i class="bi bi-eye"></i> Current Video Resume</h2>

            <video controls>
                <source src="{{ url_for('static', filename=student.video_resume) }}" type="video/webm">
                Your browser does not support the video tag.
            </video>

            <form action="{{ url_for('video_resume.update_video_resume') }}" method="POST" enctype="multipart/form-data" class="mt-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-arrow-repeat"></i> Replace with New Video
                </label>
                <input type="file" name="video" class="form-control upload-input" accept="video/webm,video/mp4" required>
                <button type="submit" class="btn-action btn-start mt-3">
                    <i class="bi bi-upload"></i> Update Video Resume
                </button>
            </form>
        </section>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let timer = 30;
        let countdown;

        const video = document.getElementById("preview");
        const timerEl = document.getElementById("timer");
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const statusEl = document.getElementById("status");

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });

                video.srcObject = stream;

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: "video/webm"
                });

                recordedChunks = [];
                mediaRecorder.start();

                startBtn.disabled = true;
                stopBtn.disabled = false;
                timerEl.classList.add("recording");

                timer = 30;
                timerEl.innerText = timer + "s";

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                countdown = setInterval(() => {
                    timer--;
                    timerEl.innerText = timer + "s";
                    if (timer === 0) stopRecording();
                }, 1000);
            } catch (error) {
                showStatus("Error accessing camera: " + error.message, false);
            }
        };

        function stopRecording() {
            clearInterval(countdown);
            mediaRecorder.stop();

            mediaRecorder.onstop = async () => {
                const blob = new Blob(recordedChunks, { type: "video/webm" });
                const formData = new FormData();
                formData.append("video", blob, "video_resume.webm");

                try {
                    const response = await fetch('{{ url_for("video_resume.upload_video_file") }}', {
                        method: "POST",
                        body: formData
                    });

                    if (response.ok) {
                        showStatus("Video uploaded successfully!", true);
                        setTimeout(() => window.location.reload(), 2000);
                    } else {
                        const result = await response.json();
                        showStatus("Error: " + (result.error || "Upload failed"), false);
                    }
                } catch (error) {
                    showStatus("Upload failed: " + error.message, false);
                }

                startBtn.disabled = false;
                stopBtn.disabled = true;
                timerEl.classList.remove("recording");
                timer = 30;
                timerEl.innerText = timer + "s";

                const stream = video.srcObject;
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            };
        }

        stopBtn.onclick = stopRecording;

        function showStatus(message, success) {
            statusEl.textContent = message;
            statusEl.className = "status-message " + (success ? "status-success" : "status-error");
            statusEl.style.display = "block";
        }
    </script>
</body>
</html>
