<!DOCTYPE html>
<html>
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Resume</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>
<body>
    <a href="{{ url_for('student.student_dashboard') }}" class="cx-logo-link" aria-label="Go to Student Dashboard">
        <span class="cx-logo-text">CampusXHire</span>
    </a>

    <style>
        .cx-logo-link {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 9999;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
        }
        .cx-logo-link:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        }
        .cx-logo-text {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.2px;
            color: #0f172a;
        }
    </style>
<h2>Video Resume</h2>

<video width="400" controls>
    <source src="{{ url_for('serve_video', filename=video.video_filename) }}">
</video>

</body>
</html>
