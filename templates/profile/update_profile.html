<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Profile - CampusXHire</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --accent-color: #059669;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            background: linear-gradient(135deg, var(--light-bg) 0%, #e0e7ff 100%);
            font-family: 'Inter', "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page-header {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            border-top: 3px solid transparent;
            border-image: linear-gradient(90deg, var(--primary-color), var(--secondary-color)) 1;
            animation: fadeIn 0.6s ease-out;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-title i {
            color: var(--primary-color);
            font-size: 2.2rem;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            border-top: 3px solid transparent;
            border-image: linear-gradient(90deg, var(--primary-color), var(--secondary-color)) 1;
            animation: fadeIn 0.6s ease-out;
        }

        .form-section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section-title i {
            color: var(--secondary-color);
        }

        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: var(--primary-color);
            font-size: 0.95rem;
        }

        .form-control,
        .form-select,
        textarea {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f0f4ff;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus {
            background: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
        }
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .input-group-text {
            background: white;
            border: 1px solid #e0e0e0;
            color: #3498db;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
        }

        .btn-save {
            background: linear-gradient(90deg, #27ae60, #229954);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
            color: white;
        }

        .btn-cancel {
            background: white;
            color: #0d1b2a;
            border: 2px solid #bdc3c7;
        }

        .btn-cancel:hover {
            transform: translateY(-3px);
            background: #ecf0f1;
        }

        .video-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .video-preview {
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .video-preview video {
            width: 100%;
            display: block;
        }

        .divider {
            margin: 30px 0;
            border: none;
            border-top: 2px dashed #e0e0e0;
        }

        .info-badge {
            display: inline-block;
            background: #ecf8ff;
            color: #3498db;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button,
            .button-group a {
                width: 100% !important;
            }
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>

<body>

<div class="container mt-5 mb-5">
    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title">
            <i class="bi bi-pencil-square"></i> Update Your Profile
        </h1>
        <p class="text-muted mt-2">Make changes to your professional profile</p>
    </div>

    <!-- Profile Information Form -->
    <div class="form-card">
        <h3 class="form-section-title">
            <i class="bi bi-person-badge"></i> Personal Information
        </h3>

        <form method="POST">
            <!-- Name and Mobile -->
            <div class="form-row">
                <div>
                    <label class="form-label">
                        <i class="bi bi-person-fill"></i> Full Name
                    </label>
                    <input type="text" name="full_name" class="form-control" 
                           value="{{ student.full_name }}" required>
                </div>
                <div>
                    <label class="form-label">
                        <i class="bi bi-telephone"></i> Mobile Number
                    </label>
                    <input type="text" name="mobile_no" class="form-control" 
                           value="{{ student.mobile_no }}" required>
                </div>
            </div>

            <!-- Field and Specialization -->
            <div class="form-row">
                <div>
                    <label class="form-label">
                        <i class="bi bi-book"></i> Field of Study
                    </label>
                    <input type="text" name="field" class="form-control" 
                           value="{{ student.field }}" required>
                </div>
                <div>
                    <label class="form-label">
                        <i class="bi bi-mortarboard"></i> Specialization
                    </label>
                    <input type="text" name="specialization" class="form-control" 
                           value="{{ student.specialization or '' }}">
                </div>
            </div>

            <!-- Start Year and End Year -->
            <div class="form-row">
                <div>
                    <label class="form-label">
                        <i class="bi bi-calendar-event"></i> Start Year
                    </label>
                    <input type="number" name="start_year" class="form-control" 
                           value="{{ student.start_year }}">
                </div>
                <div>
                    <label class="form-label">
                        <i class="bi bi-calendar-check"></i> End Year
                    </label>
                    <input type="number" name="end_year" class="form-control" 
                           value="{{ student.end_year }}">
                </div>
            </div>

            <hr class="divider">

            <!-- Career Information -->
            <h3 class="form-section-title">
                <i class="bi bi-briefcase"></i> Career Information
            </h3>

            <div>
                <label class="form-label">
                    <i class="bi bi-target"></i> Career Objective
                </label>
                <textarea name="objective" class="form-control" rows="3" 
                          placeholder="Share your career goals and aspirations...">{{ student.objective or '' }}</textarea>
            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-folder-check"></i> Projects
                </label>
                <textarea name="projects" class="form-control" rows="4"
                          placeholder="Describe your projects, technologies used, and outcomes...">{% if student.projects %}{% for project in student.projects %}{{ project.description }}
{% endfor %}{% endif %}</textarea>
            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-briefcase-check"></i> Internship Experience
                </label>
                <textarea name="internship" class="form-control" rows="3"
                          placeholder="Share your internship experiences, roles, and responsibilities...">{{ student.internship or '' }}</textarea>
            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-award"></i> Certifications
                </label>
                <textarea name="certifications" class="form-control" rows="3"
                          placeholder="List your certifications, courses, and achievements...">{{ student.certifications or '' }}</textarea>
            </div>

            <hr class="divider">

            <!-- Skills and Languages -->
            <h3 class="form-section-title">
                <i class="bi bi-lightning"></i> Skills & Languages
            </h3>

            <div>
                <label class="form-label">
                    <i class="bi bi-lightning-charge"></i> Skills (comma separated)
                </label>
                <input type="text" name="skills" class="form-control" 
                       value="{% if student.skills %}{{ student.skills|map(attribute='name')|join(', ') }}{% endif %}"
                       placeholder="e.g., Python, JavaScript, React, Django">
            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-chat-left-text"></i> Languages
                </label>
                <input type="text" name="languages" class="form-control" 
                       value="{{ student.languages or '' }}"
                       placeholder="e.g., English, Hindi, Spanish">
            </div>

            <hr class="divider">

            <!-- Social Links -->
            <h3 class="form-section-title">
                <i class="bi bi-link-45deg"></i> Social Links
            </h3>

            <div class="form-row">
                <div>
                    <label class="form-label">
                        <i class="bi bi-github"></i> GitHub Profile
                    </label>
                    <input type="url" name="github" class="form-control" 
                           value="{{ student.github or '' }}"
                           placeholder="https://github.com/username">
                </div>
                <div>
                    <label class="form-label">
                        <i class="bi bi-linkedin"></i> LinkedIn Profile
                    </label>
                    <input type="url" name="linkedin" class="form-control" 
                           value="{{ student.linkedin or '' }}"
                           placeholder="https://linkedin.com/in/username">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="submit" class="btn btn-save">
                    <i class="bi bi-check-circle"></i> Save Changes
                </button>
                <a href="{{ url_for('student.view_profile') }}" class="btn btn-cancel">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <!-- Video Resume Update Section -->
    {% if student and student.video_resume %}
    <div class="video-section">
        <h3 class="form-section-title">
            <i class="bi bi-camera-video"></i> Update Video Resume
        </h3>

        <div class="info-badge">
            <i class="bi bi-info-circle"></i> You already have a video resume uploaded
        </div>

        <div class="video-preview">
            <video controls>
                <source src="{{ url_for('static', filename=student.video_resume.replace('static/', '')) }}" 
                        type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <form action="{{ url_for('video_resume.update_video_resume') }}" 
              method="POST" enctype="multipart/form-data">
            
            <div>
                <label class="form-label">
                    <i class="bi bi-file-earmark-video"></i> Replace with New Video
                </label>
                <input type="file" name="video" class="form-control" 
                       accept="video/webm,video/mp4" required>
            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-eye"></i> Video Visibility
                </label>
                <select name="visibility" class="form-select">
                    <option value="public" {% if student.video_visibility == 'public' %}selected{% endif %}>
                        ðŸŒ Public (Everyone can see)
                    </option>
                    <option value="after_apply" {% if student.video_visibility == 'after_apply' %}selected{% endif %}>
                        ðŸ“ After Apply (Visible after application)
                    </option>
                    <option value="private" {% if student.video_visibility == 'private' %}selected{% endif %}>
                        ðŸ”’ Private (Only you can see)
                    </option>
                </select>
            </div>

            <div class="button-group mt-3">
                <button type="submit" class="btn btn-save">
                    <i class="bi bi-arrow-clockwise"></i> Update Video Resume
                </button>
            </div>
        </form>
    </div>
    {% endif %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
