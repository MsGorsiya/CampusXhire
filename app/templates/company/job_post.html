<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post a Job | CampusXHire</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #eef2f7;
            min-height: 100vh;
        }
        .page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }
        .job-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            max-width: 860px;
            width: 100%;
        }
        .badge-skill {
            background: #0d6efd;
            margin-right: 5px;
        }

        .form-title {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-label {
            font-weight: 600;
            color: #1f2937;
        }

        .form-control,
        .form-select,
        textarea.form-control {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 14px;
            transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }

        .form-control:focus,
        .form-select:focus,
        textarea.form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
            transform: scale(1.02);
        }

        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            pointer-events: none;
        }
        .input-icon .form-control,
        .input-icon .form-select {
            padding-left: 38px;
        }

        .btn {
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 600;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: #4f46e5;
            border-color: #4f46e5;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }
        .btn-primary:hover {
            background: #4338ca;
            border-color: #4338ca;
        }
        .btn-outline-soft {
            color: #334155;
            border: 1px solid #cbd5f5;
            background: transparent;
        }
        .btn-outline-soft:hover {
            background: #eef2ff;
            border-color: #a5b4fc;
        }
        .btn-success {
            background: #16a34a;
            border-color: #16a34a;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
        }
        .btn-success:hover {
            background: #15803d;
            border-color: #15803d;
        }

        .steps-wrap {
            position: relative;
            min-height: 420px;
        }
        .step {
            display: none;
            animation: stepIn 0.4s ease;
        }
        .step.active {
            display: block;
        }
        .step.step-out {
            display: block;
            animation: stepOut 0.35s ease;
        }

        @keyframes stepIn {
            from { opacity: 0; transform: translateX(24px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes stepOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-24px); }
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>

<body>
    <a href="{{ url_for('student.student_dashboard') }}" class="cx-logo-link" aria-label="Go to Student Dashboard">
        <span class="cx-logo-text">CampusXHire</span>
    </a>

    <style>
        .cx-logo-link {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 9999;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
        }
        .cx-logo-link:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        }
        .cx-logo-text {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.2px;
            color: #0f172a;
        }
    </style>

<div class="page-wrap">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9 col-xl-8">

            <div class="job-card">
                <h3 class="mb-4 text-center form-title">Post a Job Requirement</h3>

                {% if success %}
                <div class="alert alert-success">{{ success }}</div>
                {% endif %}

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/company/job-post" id="jobForm">

                    <div class="steps-wrap">
                    <!-- STEP 1 -->
                    <div class="step active">
                        <h5>Job Basic Details</h5>

                        <div class="mb-3">
                            <label class="form-label">Job Title</label>
                            <div class="input-icon">
                                <i class="bi bi-briefcase"></i>
                                <input type="text" name="job_title" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-grid mb-3">
                            <div>
                                <label class="form-label">Job Type</label>
                                <div class="input-icon">
                                    <i class="bi bi-grid-3x3-gap"></i>
                                    <select name="job_type" class="form-select">
                                    <option>Full-Time</option>
                                    <option>Internship</option>
                                    <option>Part-Time</option>
                                    <option>Contract</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="form-label">Work Mode</label>
                                <div class="input-icon">
                                    <i class="bi bi-laptop"></i>
                                    <select name="work_mode" class="form-select">
                                    <option>On-site</option>
                                    <option>Remote</option>
                                    <option>Hybrid</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <div class="input-icon">
                                <i class="bi bi-geo-alt"></i>
                                <input type="text" name="location" class="form-control">
                            </div>
                        </div>

                        <button type="button" class="btn btn-primary float-end" onclick="nextStep()">Next</button>
                    </div>

                    <!-- STEP 2 -->
                    <div class="step">
                        <h5>Candidate Requirements</h5>

                        <div class="form-grid mb-3">
                            <div>
                                <label>Experience</label>
                                <div class="input-icon">
                                    <i class="bi bi-briefcase-fill"></i>
                                    <select name="experience" class="form-select">
                                    <option>Fresher</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label>Education</label>
                                <div class="input-icon">
                                    <i class="bi bi-mortarboard"></i>
                                    <select name="education" class="form-select">
                                    <option>Any Graduate</option>
                                    <option>B.Tech</option>
                                    <option>B.E.</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Required Skills</label>
                            <div class="input-icon">
                                <i class="bi bi-tags"></i>
                                <input type="text" id="skillInput" class="form-control" placeholder="Press Enter">
                            </div>
                            <input type="hidden" name="skills" id="skillsHidden">
                            <div class="mt-2" id="skillList"></div>
                        </div>

                        <div class="mb-3">
                            <label>Job Description</label>
                            <textarea name="description" class="form-control" rows="4"></textarea>
                        </div>

                        <button type="button" class="btn btn-outline-soft" onclick="prevStep()">Back</button>
                        <button type="button" class="btn btn-primary float-end" onclick="nextStep()">Next</button>
                    </div>

                    <!-- STEP 3 -->
                    <div class="step">
                        <h5>Salary & Hiring Process</h5>

                        <div class="mb-3">
                            <label>Salary</label>
                            <div class="input-icon">
                                <i class="bi bi-currency-rupee"></i>
                                <input type="text" name="salary" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Openings</label>
                            <div class="input-icon">
                                <i class="bi bi-people"></i>
                                <input type="number" name="openings" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Selection Process</label>
                            <textarea name="selection_process" class="form-control"></textarea>
                        </div>

                        <div class="mb-3">
                            <label>Deadline</label>
                            <div class="input-icon">
                                <i class="bi bi-calendar-event"></i>
                                <input type="date" name="deadline" id="deadlineInput" class="form-control" required>
                            </div>
                        </div>

                        <button type="button" class="btn btn-outline-soft" onclick="prevStep()">Back</button>
                        <button type="submit" id="postJobBtn" class="btn btn-success float-end">Post Job</button>
                    </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll('.step');
const deadlineInput = document.getElementById("deadlineInput");

function showStep(i) {
    const current = steps[currentStep];
    const next = steps[i];

    if (current === next) return;

    current.classList.add('step-out');
    next.classList.add('active');

    current.addEventListener("animationend", () => {
        current.classList.remove('active', 'step-out');
    }, { once: true });

    currentStep = i;
}
function nextStep() {
    if (currentStep < steps.length - 1) showStep(currentStep + 1);
}
function prevStep() {
    if (currentStep > 0) showStep(currentStep - 1);
}

const skillInput = document.getElementById("skillInput");
const skillList = document.getElementById("skillList");
const skillsHidden = document.getElementById("skillsHidden");
let skills = [];

function addSkill(skill) {
    if (!skill) return;
    skills.push(skill);
    skillsHidden.value = skills.join(",");
    const badge = document.createElement("span");
    badge.className = "badge badge-skill me-1";
    badge.innerText = skill;
    skillList.appendChild(badge);
}

skillInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        e.preventDefault();
        const skill = skillInput.value.trim();
        if (skill) {
            addSkill(skill);
            skillInput.value = "";
        }
    }
});

// Ensure any typed-but-not-entered skill is included before submit
document.getElementById('jobForm').addEventListener('submit', function (e) {
    const postJobBtn = document.getElementById('postJobBtn');
    const typed = skillInput.value.trim();
    if (typed) {
        addSkill(typed);
        skillInput.value = '';
    }
    // always sync hidden input
    skillsHidden.value = skills.join(',');

    // hard stop if deadline is missing or before today
    if (!deadlineInput.value) {
        e.preventDefault();
        alert("Please select an application deadline.");
        return;
    }
    if (deadlineInput.min && deadlineInput.value < deadlineInput.min) {
        e.preventDefault();
        alert("Deadline cannot be in the past.");
        return;
    }

    if (postJobBtn) {
        postJobBtn.disabled = true;
        postJobBtn.innerText = "Posting...";
    }
});

// Client-side minimum date guard (server still validates)
const today = new Date();
const month = String(today.getMonth() + 1).padStart(2, "0");
const day = String(today.getDate()).padStart(2, "0");
const isoDate = `${today.getFullYear()}-${month}-${day}`;
deadlineInput.min = isoDate;
</script>

</body>
</html>
