<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1f4b7a;
            --secondary: #2f6ea6;
            --accent: #4c8ec7;
            --dark: #0f2337;
            --light: #e7edf3;
            --surface: #f7f9fc;
            --white: #ffffff;
            --text-dark: #1a2d3f;
            --text-muted: #5f7388;
            --border: #d6e0ea;
            --shadow-md: 0 10px 24px rgba(15, 35, 55, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #f7f9fc 0%, #eef3f8 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .analytics-container {
            width: min(700px, 100%);
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow-md);
            padding: 28px;
            text-align: center;
            animation: slideIn 0.45s ease-out;
        }

        h2 {
            margin: 0 0 18px;
            color: var(--dark);
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .analytics-subtitle {
            margin: 0 0 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>
<body>
<div class="analytics-container">
    <h2>Application Analytics</h2>
    <p class="analytics-subtitle">Overview of approval outcomes</p>
    <canvas id="applicationChart"></canvas>
</div>

<script>
    const ctx = document.getElementById("applicationChart").getContext("2d");

    new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["Approved", "Rejected", "Pending"],
            datasets: [{
                data: [
                    {{ approved or 0 }},
                    {{ rejected or 0 }},
                    {{ pending or 0 }}
                ],
                backgroundColor: ["#2f6ea6", "#1f4b7a", "#4c8ec7"],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: "bottom"
                }
            }
        }
    });
</script>
</body>
</html>
