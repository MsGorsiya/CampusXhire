<!DOCTYPE html>
<html lang="en">
<head> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Build Professional Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1f4b7a;
            --secondary: #2f6ea6;
            --accent: #4c8ec7;
            --light: #e7edf3;
            --surface: #f7f9fc;
            --white: #ffffff;
            --text-dark: #1a2d3f;
            --text-muted: #5f7388;
            --border: #d6e0ea;
            --shadow-md: 0 10px 24px rgba(15, 35, 55, 0.1);
        }
        body {
            background: linear-gradient(160deg, #f7f9fc 0%, #eef3f8 100%);
            color: var(--text-dark);
        }
        .section-title {
            border-left: 4px solid var(--secondary);
            padding-left: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--secondary);
        }
        .card {
            border-radius: 15px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md) !important;
            animation: slideIn 0.45s ease-out;
        }
        label { font-weight: 500; margin-bottom: 5px; }
        .form-control {
            border: 1px solid var(--border);
            color: var(--text-dark);
        }
        .form-control:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 0.2rem rgba(47, 110, 166, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
        }
        .btn-success {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border: none;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}"></head>
<body>
<div class="container mt-5 mb-5">
    <div class="card shadow-lg p-5">
        <h2 class="text-center text-primary mb-4">
            <i class="bi bi-file-earmark-person"></i> Build Your Professional Resume
        </h2>

        <form method="POST" action="{{ url_for('resume.resume_form') }}" enctype="multipart/form-data">
            <h4 class="section-title">Personal Information</h4>

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" class="form-control" name="full_name" value="{{ student.full_name or '' }}" readonly>
            </div>

            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" class="form-control" name="email" value="{{ student.email or '' }}" readonly>
            </div>

            <div class="mb-3">
                <label>Mobile Number</label>
                <input type="text" class="form-control" name="mobile_no" value="{{ student.mobile_no or '' }}" readonly>
            </div>

            <div class="mb-3">
                <label>Professional Title</label>
                <input
                    type="text"
                    class="form-control"
                    name="title"
                    placeholder="Example: Full Stack Developer | MBA Marketing | Data Analyst"
                    value="{{ student.specialization or student.field or '' }}"
                >
            </div>

            <div class="mb-3">
                <label>Upload Profile Photo</label>
                <input type="file" class="form-control" name="photo">
            </div>

            <h4 class="section-title">Career Summary</h4>
            <div class="mb-3">
                <label>Professional Objective</label>
                <textarea
                    class="form-control"
                    name="objective"
                    rows="4"
                    placeholder="Example: Motivated MBA graduate seeking opportunities in business analytics where I can apply strategic thinking and data-driven decision-making skills."
                >{{ student.objective or '' }}</textarea>
            </div>

            <h4 class="section-title">Experience / Internship</h4>
            <div class="mb-3">
                <label>Work Experience</label>
                <textarea
                    class="form-control"
                    name="internship"
                    rows="4"
                    placeholder="Example:
Marketing Intern - XYZ Pvt Ltd (Jan 2024 - Mar 2024)
- Conducted market research
- Assisted in digital campaigns"
                >{{ student.internship if student.internship is defined else '' }}</textarea>
            </div>

            <h4 class="section-title">Projects</h4>
            <div class="mb-3">
                <label>Academic / Personal Projects</label>
                <textarea
                    class="form-control"
                    name="projects"
                    rows="4"
                    placeholder="Example:
Job Portal Web App - Developed using Flask & MySQL
Resume Builder System - Automated PDF Resume Generator"
                >{% for project in student.projects %}
{{ project.title }} - {{ project.description }}
{% endfor %}</textarea>
            </div>

            <div class="mb-3">
                <label>GitHub</label>
                <input type="url" name="github" class="form-control" value="{{ student.github or '' }}">
            </div>

            <div class="mb-3">
                <label>LinkedIn</label>
                <input type="url" name="linkedin" class="form-control" value="{{ student.linkedin or '' }}">
            </div>

            <div class="mb-3">
                <label>Portfolio Website</label>
                <input type="url" name="portfolio" class="form-control" value="{{ student.portfolio or ('/portfolio/' ~ student.slug if student.slug else '') }}">
            </div>

            <h4 class="section-title">Skills</h4>
            <div class="mb-3">
                <label>Technical & Soft Skills</label>
                <input
                    type="text"
                    class="form-control"
                    name="skills"
                    value="{% for skill in student.skills %}{{ skill.name }}{% if not loop.last %}, {% endif %}{% endfor %}"
                    placeholder="Example: Python, Flask, SQL, Leadership, Communication"
                >
            </div>

            <h4 class="section-title">Education</h4>
            <div class="mb-3">
                <label>Degree Details</label>
                <textarea
                    class="form-control"
                    name="education"
                    rows="3"
                    placeholder="Example:
MBA - Marketing
XYZ University (2023 - 2025)"
                >{{ student.field or '' }} ({{ student.start_year }} - {{ student.end_year }})</textarea>
            </div>

            <h4 class="section-title">Academic Details</h4>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Current / Last Semester</label>
                    <select class="form-control" name="sem">
                        <option value="">Select Semester</option>
                        {% for i in range(1, 9) %}
                        <option value="{{ i }}" {% if student.sem == i %}selected{% endif %}>Semester {{ i }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>CGPA</label>
                    <input
                        type="number"
                        class="form-control"
                        name="cgpa"
                        step="0.01"
                        min="0"
                        max="10"
                        placeholder="Example: 8.45"
                        value="{{ student.cgpa or '' }}"
                    >
                </div>
            </div>

            <h4 class="section-title">Certifications</h4>
            <div class="mb-3">
                <label>Certifications</label>
                <input
                    type="text"
                    class="form-control"
                    name="certifications"
                    value="{% for cert in student.certificate %}{{ cert.title }}{% if not loop.last %}, {% endif %}{% endfor %}"
                    placeholder="Example: Google Data Analytics, AWS Cloud Practitioner"
                >
            </div>

            <h4 class="section-title">Languages</h4>
            <div class="mb-4">
                <label>Languages Known</label>
                <input
                    type="text"
                    class="form-control"
                    name="languages"
                    value="{{ student.languages if student.languages is defined else '' }}"
                    placeholder="Example: English (Fluent), Hindi (Native)"
                >
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary w-50" name="action" value="save">
                    <i class="bi bi-save"></i> Save Resume
                </button>

                <button type="submit" class="btn btn-success w-50" name="action" value="download">
                    <i class="bi bi-download"></i> Download PDF
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
